name: backend-ci

on:
  push:
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest

    # test_concurrency.py talks to a real Postgres (SELECT FOR UPDATE + MVCC
    # semantics can't be validated on SQLite). We spin up a throwaway Postgres
    # service per CI run. Everything else still runs against in-memory SQLite
    # via the test fixtures — only the concurrency module reaches this DB.
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: zippie_test
          POSTGRES_PASSWORD: zippie_test
          POSTGRES_DB: zippie_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      # Wired into pytest so conftest + test_concurrency can reach the service.
      DATABASE_URL: postgresql://zippie_test:zippie_test@localhost:5432/zippie_test
      # Settings.secret_key_valid requires >= 32 chars in non-test envs; the
      # conftest sets ENVIRONMENT=test explicitly so this is just a placeholder.
      SECRET_KEY: ci-runner-secret-key-minimum-32-chars-xxxxxxxxxxxx
      LOG_FORMAT: text
      ENVIRONMENT: test

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.9
        uses: actions/setup-python@v5
        with:
          python-version: '3.9'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: black --check
        working-directory: backend
        run: black --check app/ tests/

      - name: isort --check-only
        working-directory: backend
        run: isort --check-only app/ tests/

      - name: flake8
        working-directory: backend
        run: flake8 app/ tests/

      - name: mypy
        working-directory: backend
        continue-on-error: true
        run: mypy app/ --ignore-missing-imports

      - name: pytest
        working-directory: backend
        run: pytest --cov=app --cov-report=term --cov-report=xml -x

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
